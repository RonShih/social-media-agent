# brand.example.yaml — 換客戶 / 換品牌時的範本
#
# 用法：
#   cp config/brand.example.yaml config/brand.yaml
#   然後手動填、或對 Claude 打 /setup 對話式建立
#
# 所有欄位都必填，除非有「（選填）」標記。

# ───────────────────────────────────────────────
# 1. 公司
# ───────────────────────────────────────────────
company:
  name_zh: <中文公司名>
  name_en: <英文公司名 / 品牌名 — 也會當 #hashtag 使用>
  website: <https://...>
  email: <主要聯絡 email>
  backup_email: <備用 email（選填）>
  address: <地址（選填）>
  description: |
    <一段話描述業務 / 主要服務 / 目標客群。給 draft-* 當 context 用。>

# ───────────────────────────────────────────────
# 2. 品牌調性
# ───────────────────────────────────────────────
voice:
  tone: <例：專業而親切 / 活潑年輕 / 嚴謹學術>
  audience: [<目標客群 1>, <目標客群 2>]
  emphasis: [<想強調的價值 1>, <想強調的價值 2>]
  forbidden_words: [<禁用詞 1>, <禁用詞 2>]
  forbidden_behavior: [<禁止行為 1>, <禁止行為 2>]

# ───────────────────────────────────────────────
# 3. 社群帳號（5 平台）
# ───────────────────────────────────────────────
socials:
  facebook:
    handle: <FB 帳號 / 粉專名>
    url: <https://www.facebook.com/...>
  instagram:
    handle: <IG 帳號>
    url: <https://www.instagram.com/...>
  tiktok:
    handle: <TikTok 帳號>
    url: <https://www.tiktok.com/@...>
  youtube:
    handle: <YT 頻道名>
    url: <https://www.youtube.com/channel/... 或 /@handle>
  x:
    handle: <X 帳號>
    url: <https://x.com/...>

# ───────────────────────────────────────────────
# 4. 產品線（draft-* 抽樣產文用）
#   每個產品一個 - block，可有任意多個
# ───────────────────────────────────────────────
products:
  - id: <短 id，例：md905>
    name: <顯示名稱>
    category: <類別>
    selling_points:
      - <賣點 1>
      - <賣點 2>
    target_audience: [<該產品的目標客群 1>, <2>]

  # - id: ...
  #   name: ...

# ───────────────────────────────────────────────
# 5. 內容主題（draft-* 用）
# ───────────────────────────────────────────────
content_themes:
  - <主題 1，例：產品介紹>
  - <主題 2，例：技術知識>
  - <主題 3，例：客戶案例>

# ───────────────────────────────────────────────
# 6. 本地儲存路徑（一般不用改）
# ───────────────────────────────────────────────
storage:
  assets_dir: media/assets
  drafts_dir: reports/drafts
  posts_dir: reports/posts
